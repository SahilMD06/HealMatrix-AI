server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Only reachable inside the self-hosted docker-compose.prod.yml stack, where
    # "backend" resolves via Docker's internal DNS to the API container. This is
    # what lets the frontend image ship with the default relative
    # VITE_API_BASE_URL (/api/v1) baked in and still reach the API without a
    # separate build-time origin — the cloud path (Vercel + Render) instead sets
    # VITE_API_BASE_URL to the Render API's public URL at build time and never
    # hits this block (see deployment/vercel/README.md).
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
