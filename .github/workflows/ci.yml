name: HealMatrix CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend - lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements-dev.txt
            backend/requirements-ai.txt
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          # requirements-ai.txt (langgraph, crewai, sentence-transformers, faiss)
          # is required too: the agent modules import it unconditionally, so
          # collecting tests/unit/test_graph_routing.py and
          # tests/integration/test_agent_cycle.py fails without it, even though
          # requirements-dev.txt alone is enough for the non-agent test files.
          pip install -r requirements-dev.txt -r requirements-ai.txt
      - name: Lint
        working-directory: backend
        run: ruff check app tests
      - name: Test
        working-directory: backend
        env:
          # The suite runs against an in-memory MongoDB (mongomock-motor),
          # so no database service container is required.
          JWT_SECRET_KEY: ci-test-secret-key-not-for-production-use-only
          ENVIRONMENT: test
          BCRYPT_ROUNDS: "4"
          GOOGLE_API_KEY: ""
        run: pytest --cov=app --cov-report=term-missing

  frontend:
    name: Frontend - lint, test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Test
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f docker/backend.Dockerfile -t healmatrix-backend:ci ./backend
      - name: Build frontend image
        run: docker build -f docker/frontend.Dockerfile --target build -t healmatrix-frontend:ci ./frontend
